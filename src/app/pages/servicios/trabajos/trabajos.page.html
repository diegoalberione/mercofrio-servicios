<ion-header [translucent]="true">
  <ion-toolbar color="primary" class="ion-text-center">
    <ion-button slot="start" class="ion-no-padding" (click)="atras()">
      <ion-icon color="light" slot="icon-only" name="chevron-back"></ion-icon>
    </ion-button>
    <ion-title>Trabajos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid class="container">
    <ion-row class="ion-justify-content-center ion-align-items-center">
      <ion-col size="12">
        <h4 class="ion-text-center titulo">
          <ion-label>{{editandoIndex >= 0 ? 'Editar Trabajo' : 'Agregar Trabajos'}}</ion-label>
        </h4>
        <ion-card class="ion-margin-bottom">
          <ion-list class="ion-padding-bottom">
            <ion-item class="ion-padding-bottom">
              <ion-label position="floating">Descripción / Tareas </ion-label>
              <ion-textarea autoGrow="true"
                placeholder="Ingrese una descripción/tarea"
                [(ngModel)]="trabajo.observacion"
              ></ion-textarea>
            </ion-item>
          </ion-list>
        </ion-card>
      </ion-col>
      <ion-col size="10">
        <ion-button
          expand="full"
          shape="round"
          (click)="agregarTrabajo()"
          color="primary"
          [disabled]="!this.trabajo.observacion"
          >{{editandoIndex >= 0 ? 'Actualizar' : 'Agregar'}}
        </ion-button>
        <ion-button
          *ngIf="editandoIndex >= 0"
          expand="full"
          shape="round"
          (click)="cancelarEdicion()"
          color="medium"
          class="ion-margin-top"
          >Cancelar Edición
        </ion-button>
      </ion-col>
    </ion-row>

    <ion-row *ngIf="trabajos.length !== 0" class="ion-justify-content-center ion-align-items-center">
      <ion-col size="12">
        <h6 class="ion-text-center">
          <ion-label>Trabajos agregados</ion-label>
        </h6>
        <ion-card>
          <ion-list>
            <ion-item *ngFor="let item of trabajos; let i = index" tappable [class.item-editando]="editandoIndex === i">
              <ion-icon slot="end" name="trash" color="danger" tappable (click)="eliminarServicio(i)"></ion-icon>
              <ion-icon slot="end" name="create" color="primary" tappable (click)="editarTrabajo(i)" class="ion-margin-end"></ion-icon>
              <ion-label class="ion-text-wrap">
                <ion-text color="primary">
                  <h3>{{item.nombre}}</h3>
                </ion-text>
                <p>{{item.observacion}}</p>
                <ion-text *ngIf="editandoIndex === i" color="warning">
                  <small>Editando...</small>
                </ion-text>
              </ion-label>
            </ion-item>
          </ion-list>
        </ion-card>
      </ion-col>      
      <ion-col size="10">
        <ion-button
          expand="full"
          shape="round"
          (click)="salir()"
          color="success"
          >Guardar
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
