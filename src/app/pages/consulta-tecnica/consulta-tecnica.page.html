<ion-header [translucent]="true">
  <ion-toolbar color="primary" class="ion-text-center">
    <ion-button slot="start" class="ion-no-padding" routerLink="/home">
      <ion-icon color="light" slot="icon-only" name="chevron-back"></ion-icon>
    </ion-button>
    <ion-title>Consulta tecnica</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid fixed>
    <ion-row>
      <ion-col size="12" class="ion-text-center" *ngIf="">
        <ion-label>El contenido no está disponible por falta de internet</ion-label>
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-grid class="container">

    <ion-row>
      <ion-col size="12" class="ion-text-center ">
        <!-- <h2 class="ion-text-center titulo"><ion-label>Nueva visita</ion-label></h2> -->

        <h6><ion-label class="ion-padding">Seleccione el manual a consultar</ion-label></h6>

        <ion-card class="ion-margin-top">
          <ion-list>
            <ion-item button="true">
              <ion-label>Manual</ion-label>
              <ionic-selectable
              headerColor="primary"
              [isMultiple]="false"
              [items]="manualDisponibles"
              itemValueField="id"
              itemTextField="nombre"
              [canSearch]="true"
              [(ngModel)]="manualSeleccionado"
              searchPlaceholder="Buscar manual"
              closeButtonText="Cancelar"
              confirmButtonText="Seleccionar"
              placeholder="Seleccione un manual">
              <ng-template ionicSelectableSearchFailTemplate>
                <div padding>
                  No se han encontrado manuales.
                </div>
              </ng-template>
            </ionic-selectable>
            </ion-item>
          </ion-list>
        </ion-card>
      </ion-col>
    </ion-row>
    <ion-row class="ion-justify-content-center" *ngIf="!!manualSeleccionado">
      <ion-col size="12">
        <ion-card class="ion-text-center ion-padding">
          <ion-label><b>Manual: {{manualSeleccionado.nombre}}</b></ion-label>
          <br>
          <ion-label>{{manualSeleccionado.descripcion}}</ion-label>
          <ion-button (click)="abrirDocumento()" expand="block" color="success" shape="round" class="ion-margin-top">
            Abrir
          </ion-button>
        </ion-card>
      </ion-col>
    </ion-row>

  </ion-grid>
</ion-content>
