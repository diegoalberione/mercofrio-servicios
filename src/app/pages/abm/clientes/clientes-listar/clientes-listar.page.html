<ion-header [translucent]="true">
  <ion-toolbar color="primary" class="ion-text-center">
    <ion-button slot="start" class="ion-no-padding" routerLink="/abm">
      <ion-icon color="light" slot="icon-only" name="chevron-back"></ion-icon>
    </ion-button>
    <ion-title>Clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" pullFactor="0.5" pullMin="100" pullMax="200" (ionRefresh)="getItems($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <div class="ion-text-center">
    <h4>Listado de clientes</h4>
    <ion-label *ngIf='this.total > 0' class="resultados"> 
      Resultados: 
      <ion-chip color="primary" mode="ios" outline="true">
        <ion-label><b>{{total}}</b></ion-label>
      </ion-chip>
    </ion-label>
  </div>
  
  <ion-searchbar placeholder="Buscar cliente" [debounce]="250" animated="true" mode="ios"  enterkeyhint="enter" (ionChange)="searchUsers($event)" (ionClear)="inicializarItems()"></ion-searchbar>
  <ion-card>
    <ion-list class="listado" *ngIf="!banCargando" lines="none">
      <ion-grid *ngIf="!banCargando">
        <ion-row>
          <ion-col>
            <p class="ion-text-center">
              <span *ngIf="this.total == 0">Este listado está vacío :(</span>
            </p>
          </ion-col>
        </ion-row>
      </ion-grid>

      <!-- SOLO PC -->
      <ion-grid class="ion-hide-lg-down cabecera-grilla">
        <ion-row>
          <ion-col class="ion-text-negrita">
            Nombre
          </ion-col>
          <ion-col class="ion-text-negrita">
            Opciones
          </ion-col>
        </ion-row>
      </ion-grid>

      <!-- COMPONENTE LIST RESPONSIVE -->
      <list-responsive-simple *ngFor="let item of clientes; index as i" [cols]="armarColumnas(item)" [index]="i"
        (deleteClick)="deleteItem(item.id)" (editClick)="editItem(item)">
      </list-responsive-simple>
    </ion-list>


    <ion-infinite-scroll threshold="100px" (ionInfinite)="getItems($event)">
      <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Cargando mas información...">
      </ion-infinite-scroll-content>
    </ion-infinite-scroll>
  </ion-card>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button>
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button (click)="nuevoItem()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
      <ion-fab-button (click)="fileInput.click()">
        <ion-icon name="cloud-upload-outline"></ion-icon>
      </ion-fab-button>
      <ion-fab-button (click)="descargarTemplateImportar()">
        <ion-icon name="information-circle-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>
  
  <!-- Hidden file input element -->
  <input type="file" #fileInput (change)="onFileSelected($event)" accept=".csv" style="display:none;">

  
</ion-content>
