<ion-content class="flex">
  <ion-grid class="margin-login ion-padding">

    <ion-row class="ion-align-items-center ion-justify-content-center">
      <ion-col size="8">
        <img [src]="logo" />
      </ion-col>
    </ion-row>

    <ion-row class="ion-align-items-center ion-justify-content-center">
    <ion-col size="11">
      <ion-card class="ion-no-padding">
        <ion-card-header class="ion-text-center">
          <ion-card-title><b>Iniciar sesión</b></ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <ion-item>
            <ion-label position="floating">E-Mail</ion-label>
            <ion-input [(ngModel)]="usuario.email"></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="floating">Contraseña</ion-label>
            <ion-input [(ngModel)]="usuario.password"></ion-input>
          </ion-item>
          <ion-button (click)="login()" expand="full" shape="round"  class="ion-margin-top">Ingresar</ion-button>
        </ion-card-content>
      </ion-card>
    </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
